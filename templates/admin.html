<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · amresh.dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#1a1612;
  --bg2:#221d18;
  --bg3:#2c251e;
  --white:#f5f0e6;
  --muted:rgba(245,240,230,0.5);
  --muted2:rgba(245,240,230,0.75);
  --accent:#b8ff6d;
  --coral:#ff8a5c;
  --border:rgba(245,240,230,0.1);
  --border2:rgba(245,240,230,0.2);
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--white);
  min-height:100vh;
  padding:32px 40px;
}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:24px;
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
h1{
  font-family:'Unbounded',sans-serif;
  font-size:28px;font-weight:900;letter-spacing:-1.5px;
}
h1 span{color:var(--accent);}
.refresh{
  padding:10px 20px;
  border:1px solid var(--border2);
  background:transparent;color:var(--white);
  border-radius:100px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  transition:all 0.2s;
}
.refresh:hover{border-color:var(--accent);color:var(--accent);}

/* STAT CARDS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:14px;
  margin-bottom:32px;
}
.stat{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
  position:relative;overflow:hidden;
}
.stat::after{
  content:'';position:absolute;
  top:0;right:0;width:80px;height:80px;
  background:radial-gradient(circle, rgba(184,255,109,0.12) 0%, transparent 70%);
}
.stat-label{
  font-size:11px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:10px;
}
.stat-value{
  font-family:'Unbounded',sans-serif;
  font-size:36px;font-weight:900;letter-spacing:-1.5px;
  line-height:1;
}
.stat-sub{
  font-size:12px;color:var(--muted);
  margin-top:6px;
}
.stat.accent .stat-value{color:var(--accent);}
.stat.coral .stat-value{color:var(--coral);}

/* SECTIONS */
.row{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  margin-bottom:32px;
}
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px;
}
.card-title{
  font-family:'Unbounded',sans-serif;
  font-size:14px;font-weight:700;letter-spacing:-0.3px;
  margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.card-title small{
  font-family:'DM Sans',sans-serif;
  font-size:11px;font-weight:400;color:var(--muted);
  letter-spacing:0;text-transform:none;
}

/* CHART */
.chart{
  display:flex;align-items:flex-end;gap:3px;
  height:160px;
  padding-top:10px;
}
.bar{
  flex:1;
  background:var(--accent);
  border-radius:3px 3px 0 0;
  position:relative;
  min-height:2px;
  transition:opacity 0.2s;
  cursor:pointer;
  opacity:0.85;
}
.bar:hover{opacity:1;}
.bar.empty{background:var(--bg3);opacity:0.5;}
.bar .tip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--border2);
  padding:6px 10px;border-radius:6px;
  font-size:11px;white-space:nowrap;
  opacity:0;pointer-events:none;
  transition:opacity 0.15s;
  z-index:5;
}
.bar:hover .tip{opacity:1;}
.chart-axis{
  display:flex;justify-content:space-between;
  margin-top:8px;font-size:10px;color:var(--muted);
}

/* REFERRERS */
.ref-list{display:flex;flex-direction:column;gap:10px;}
.ref-item{
  display:flex;align-items:center;justify-content:space-between;
  font-size:13px;
}
.ref-source{
  color:var(--muted2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:200px;
}
.ref-count{
  font-family:'Unbounded',sans-serif;
  font-weight:700;color:var(--accent);
  font-size:12px;
}

/* SUBMISSIONS */
.subs-card{margin-bottom:32px;}
.sub-list{display:flex;flex-direction:column;gap:12px;}
.sub{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 20px;
  display:flex;flex-direction:column;gap:10px;
  transition:border-color 0.2s;
}
.sub:hover{border-color:var(--border2);}
.sub.unread{border-color:var(--accent);}
.sub-head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
  flex-wrap:wrap;
}
.sub-name{
  font-family:'Unbounded',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:-0.3px;
}
.sub-name .badge{
  display:inline-block;
  background:var(--accent);color:var(--bg);
  font-family:'DM Sans',sans-serif;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:100px;
  margin-left:8px;letter-spacing:0.05em;text-transform:uppercase;vertical-align:middle;
}
.sub-meta{
  font-size:11px;color:var(--muted);
}
.sub-email{font-size:12px;color:var(--muted2);font-family:'DM Sans',sans-serif;}
.sub-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;}
.sub-tag{
  font-size:10px;padding:3px 9px;
  background:rgba(184,255,109,0.1);
  border:1px solid rgba(184,255,109,0.25);
  border-radius:100px;color:var(--accent);
  font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
}
.sub-msg{
  font-size:13px;line-height:1.7;color:var(--muted2);
  white-space:pre-wrap;font-weight:300;
  padding-top:6px;border-top:1px dashed var(--border);
}
.sub-actions{
  display:flex;gap:8px;margin-top:6px;
}
.sub-btn{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted2);
  padding:6px 12px;border-radius:100px;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.sub-btn:hover{border-color:var(--accent);color:var(--accent);}
.sub-btn.danger:hover{border-color:var(--coral);color:var(--coral);}

.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--muted);
  font-size:14px;
}

@media(max-width:780px){
  body{padding:20px;}
  .row{grid-template-columns:1fr;}
  h1{font-size:22px;}
}
</style>
</head>
<body>

<header>
  <h1>amresh<span>.dev</span> · admin</h1>
  <button class="refresh" onclick="loadData()">↻ Refresh</button>
</header>

<!-- STATS -->
<div class="stats-grid" id="statsGrid">
  <div class="stat">
    <div class="stat-label">Total Visits</div>
    <div class="stat-value" id="s-total">—</div>
    <div class="stat-sub" id="s-total-sub">all-time pageviews</div>
  </div>
  <div class="stat accent">
    <div class="stat-label">Unique Visitors</div>
    <div class="stat-value" id="s-unique">—</div>
    <div class="stat-sub">all-time</div>
  </div>
  <div class="stat">
    <div class="stat-label">Visits Today</div>
    <div class="stat-value" id="s-today">—</div>
    <div class="stat-sub" id="s-today-sub">—</div>
  </div>
  <div class="stat coral">
    <div class="stat-label">Form Submissions</div>
    <div class="stat-value" id="s-subs">—</div>
    <div class="stat-sub" id="s-subs-sub">—</div>
  </div>
</div>

<!-- CHART + REFERRERS -->
<div class="row">
  <div class="card">
    <div class="card-title">
      Visits — Last 30 Days
      <small>hover for details</small>
    </div>
    <div class="chart" id="chart"></div>
    <div class="chart-axis" id="chartAxis"></div>
  </div>
  <div class="card">
    <div class="card-title">Top Sources</div>
    <div class="ref-list" id="refList"></div>
  </div>
</div>

<!-- SUBMISSIONS -->
<div class="card subs-card">
  <div class="card-title">
    Recent Submissions
    <small id="subCountLabel"></small>
  </div>
  <div class="sub-list" id="subList"></div>
</div>

<script>
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
  return d.toLocaleString(undefined,{
    month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'
  });
}

function shortDate(iso){
  const [y,m,d] = iso.split('-');
  return `${d}/${m}`;
}

async function loadData(){
  try{
    const res = await fetch('/admin/api/data');
    const data = await res.json();

    // Stats
    document.getElementById('s-total').textContent = data.stats.total_visits.toLocaleString();
    document.getElementById('s-unique').textContent = data.stats.unique_visitors.toLocaleString();
    document.getElementById('s-today').textContent = data.stats.today_visits.toLocaleString();
    document.getElementById('s-today-sub').textContent =
      `${data.stats.today_unique} unique today`;
    document.getElementById('s-subs').textContent = data.stats.total_submissions.toLocaleString();
    document.getElementById('s-subs-sub').textContent =
      data.stats.unread_submissions
        ? `${data.stats.unread_submissions} unread`
        : 'all read';

    // Chart
    const chart = document.getElementById('chart');
    const axis = document.getElementById('chartAxis');
    chart.innerHTML = '';
    axis.innerHTML = '';
    const max = Math.max(...data.daily.map(d=>d.visits), 1);
    data.daily.forEach((d,i)=>{
      const bar = document.createElement('div');
      bar.className = 'bar' + (d.visits === 0 ? ' empty' : '');
      bar.style.height = (d.visits/max*100) + '%';
      bar.innerHTML = `<div class="tip">${shortDate(d.date)} — ${d.visits} visits / ${d.uniques} unique</div>`;
      chart.appendChild(bar);
    });
    // Show only first / mid / last labels to avoid clutter
    if(data.daily.length){
      const first = document.createElement('span');
      first.textContent = shortDate(data.daily[0].date);
      const mid = document.createElement('span');
      mid.textContent = shortDate(data.daily[Math.floor(data.daily.length/2)].date);
      const last = document.createElement('span');
      last.textContent = shortDate(data.daily[data.daily.length-1].date);
      axis.append(first, mid, last);
    }

    // Referrers
    const refList = document.getElementById('refList');
    refList.innerHTML = '';
    if(data.referrers.length === 0){
      refList.innerHTML = '<div style="font-size:12px;color:var(--muted)">No traffic yet.</div>';
    } else {
      data.referrers.forEach(r=>{
        const el = document.createElement('div');
        el.className = 'ref-item';
        let label = r.source;
        try{
          if(label !== '(direct)') label = new URL(label).hostname;
        }catch(e){}
        el.innerHTML = `
          <div class="ref-source" title="${r.source}">${label}</div>
          <div class="ref-count">${r.c}</div>
        `;
        refList.appendChild(el);
      });
    }

    // Submissions
    const subList = document.getElementById('subList');
    const subCount = document.getElementById('subCountLabel');
    subList.innerHTML = '';
    subCount.textContent = `${data.submissions.length} message${data.submissions.length !== 1 ? 's' : ''}`;

    if(data.submissions.length === 0){
      subList.innerHTML = '<div class="empty-state">No submissions yet. They\'ll appear here when someone fills the form.</div>';
    } else {
      data.submissions.forEach(s=>{
        const el = document.createElement('div');
        el.className = 'sub' + (s.is_read ? '' : ' unread');
        const tags = [];
        if(s.project_type) tags.push(`<span class="sub-tag">${s.project_type}</span>`);
        if(s.budget) tags.push(`<span class="sub-tag">${s.budget}</span>`);

        el.innerHTML = `
          <div class="sub-head">
            <div>
              <div class="sub-name">
                ${escapeHtml(s.name)}
                ${!s.is_read ? '<span class="badge">NEW</span>' : ''}
              </div>
              <div class="sub-email">
                <a href="mailto:${escapeHtml(s.email)}" style="color:inherit;text-decoration:none;">${escapeHtml(s.email)}</a>
              </div>
              ${tags.length ? `<div class="sub-tags">${tags.join('')}</div>` : ''}
            </div>
            <div class="sub-meta">${fmtDate(s.created_at)}</div>
          </div>
          <div class="sub-msg">${escapeHtml(s.message)}</div>
          <div class="sub-actions">
            <a class="sub-btn" href="mailto:${escapeHtml(s.email)}?subject=Re: Your project" style="text-decoration:none;display:inline-block;">Reply</a>
            ${!s.is_read ? `<button class="sub-btn" onclick="markRead(${s.id})">Mark read</button>` : ''}
            <button class="sub-btn danger" onclick="deleteSub(${s.id})">Delete</button>
          </div>
        `;
        subList.appendChild(el);
      });
    }
  } catch(err){
    console.error(err);
    alert('Failed to load data: ' + err.message);
  }
}

function escapeHtml(s){
  if(s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

async function markRead(id){
  await fetch(`/admin/api/submission/${id}/read`,{method:'POST'});
  loadData();
}

async function deleteSub(id){
  if(!confirm('Delete this submission permanently?')) return;
  await fetch(`/admin/api/submission/${id}`,{method:'DELETE'});
  loadData();
}

// Auto-load + auto-refresh every 60s
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
